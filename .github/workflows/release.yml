name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          mkdir -p build/wooseo-optimizer
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='bump-version.sh' \
            ./ build/wooseo-optimizer/
          cd build && zip -r ../wooseo-optimizer.zip wooseo-optimizer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: wooseo-optimizer.zip
          generate_release_notes: true
